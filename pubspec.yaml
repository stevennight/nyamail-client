name: nyamail
description: A private multi-platform mail client with encrypted account sync.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  crypto: ^3.0.5
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  file_picker: 10.3.3
  flutter_inappwebview: ^6.1.5
  local_auth: ^3.0.1
  tray_manager: ^0.5.3
  window_manager: ^0.5.2
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/nyamail_tray.png
